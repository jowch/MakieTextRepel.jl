name: CI
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Prereleases are informational — don't fail the workflow on them.
    continue-on-error: ${{ matrix.version == 'pre' }}
    strategy:
      fail-fast: false
      matrix:
        # Package floor is julia = "1.11"; LTS (1.10) is below it, so it is not tested.
        version: ['1.11', '1']
        os: [ubuntu-latest, macOS-latest, windows-latest]
        include:
          - version: 'pre'
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # MakieTextRepel depends on the as-yet-unregistered TextMeasure.jl via a
      # [sources] local path; clone it as a sibling so the project resolves.
      # Remove this step (and the [sources] entry) once TextMeasure is registered.
      - name: Check out unregistered TextMeasure.jl dependency
        run: git clone --depth 1 https://github.com/jowch/TextMeasure.jl ../TextMeasure.jl
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
        if: matrix.version == '1.11' && matrix.os == 'ubuntu-latest'
      - uses: codecov/codecov-action@v5
        if: matrix.version == '1.11' && matrix.os == 'ubuntu-latest'
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
